<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Car sounds</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    #stage {
      position: fixed; inset: 0;
      background: #111 center/cover no-repeat url("background.jpg");
    }
    .car {
      position: absolute; width: 18vmin; height: auto; cursor: pointer;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.4));
    }
    /* Example positions — tweak top/left for your art */
    .c1 { top: 42%; left: 12%; }
    .c2 { top: 48%; left: 38%; }
    .c3 { top: 40%; left: 62%; }
    .c4 { top: 58%; left: 78%; }
  </style>
</head>
<body>
  <div id="stage">
    <img class="car c1" src="car1.png" alt="" data-sound="engine1" />
    <img class="car c2" src="car2.png" alt="" data-sound="engine2" />
    <img class="car c3" src="car3.png" alt="" data-sound="engine3" />
    <img class="car c4" src="car4.png" alt="" data-sound="engine4" />
  </div>

  <audio id="engine1" preload="auto" src="sounds/engine1.mp3"></audio>
  <audio id="engine2" preload="auto" src="sounds/engine2.mp3"></audio>
  <audio id="engine3" preload="auto" src="sounds/engine3.mp3"></audio>
  <audio id="engine4" preload="auto" src="sounds/engine4.mp3"></audio>

  <script>
    function playSound(id) {
      const a = document.getElementById(id);
      if (!a) return;
      a.pause();
      a.currentTime = 0;
      a.play().catch(() => {});
    }
    document.querySelectorAll(".car").forEach((el) => {
      el.addEventListener("pointerup", (e) => {
        e.preventDefault();
        playSound(el.dataset.sound);
      });
    });
  </script>
</body>
</html>
